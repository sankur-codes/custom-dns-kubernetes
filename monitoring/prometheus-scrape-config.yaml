# Prometheus scrape configuration for CoreDNS node-local static pods.
#
# Option A: Static targets (simplest, for demo)
# Replace the IPs with your actual node IPs from `make deploy` output.
scrape_configs:
  - job_name: 'coredns-local'
    scrape_interval: 15s
    static_configs:
      - targets:
        # Replace these with actual node IPs
        - '<control-plane-ip>:9153'
        - '<worker-1-ip>:9153'
        - '<worker-2-ip>:9153'
        labels:
          cluster: 'custom-dns'

