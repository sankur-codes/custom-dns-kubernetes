apiVersion: v1
kind: Pod
metadata:
  name: coredns-local
  namespace: kube-system
  labels:
    app: coredns-local
    component: local-dns
spec:
  hostNetwork: true
  dnsPolicy: Default
  priorityClassName: system-node-critical
  tolerations:
  - operator: Exists
  containers:
  - name: coredns
    image: registry.k8s.io/coredns/coredns:v1.12.0
    args: ["-conf", "/etc/coredns/Corefile"]
    ports:
    - containerPort: 53
      hostPort: 53
      protocol: UDP
      name: dns
    - containerPort: 53
      hostPort: 53
      protocol: TCP
      name: dns-tcp
    - containerPort: 9153
      hostPort: 9153
      protocol: TCP
      name: metrics
    livenessProbe:
      httpGet:
        path: /health
        port: 18080
        scheme: HTTP
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /health
        port: 18080
        scheme: HTTP
      initialDelaySeconds: 5
      periodSeconds: 5
    resources:
      requests:
        cpu: 100m
        memory: 70Mi
      limits:
        memory: 170Mi
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        add: ["NET_BIND_SERVICE"]
        drop: ["ALL"]
    volumeMounts:
    - name: config
      mountPath: /etc/coredns
      readOnly: true
    - name: hosts
      mountPath: /etc/hosts
      readOnly: true
  volumes:
  - name: config
    hostPath:
      path: /etc/coredns
      type: Directory
  - name: hosts
    hostPath:
      path: /etc/hosts
      type: File
